services:
  zephyr-dev-stm32:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: zephyer-stm32

    volumes:
      - /home/devilalprajapat/workspace:/workspace:rw
      - ./:/docker-setup:rw

    working_dir: /workspace

    stdin_open: true
    tty: true

    security_opt:
      - seccomp:unconfined

    cap_add:
      - SYS_PTRACE
      - NET_ADMIN

    privileged: true

    network_mode: host
